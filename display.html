<!DOCTYPE html>
<html lang="hi">
<head>
  <link rel="icon" type="image/jpeg" href="SNT.jpg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNT Institute - Admin Dashboard Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    :root { --primary: #e65100; --secondary: #1a73e8; --success: #2e7d32; --danger: #d32f2f; --bg: #fffbf5; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; user-select: none; }
    header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(230, 81, 0, 0.2); }
    header h1 { font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
    
    .search-container { margin: 15px 0; }
    #search-input { width: 100%; padding: 14px 20px; border: 2px solid #ddd; border-radius: 30px; outline: none; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
    #search-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(230,81,0,0.1); }

    /* Student Cards Grid Layout */
    .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .student-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.03); border: 1px solid #eee; cursor: pointer; transition: 0.3s; position: relative; }
    .student-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(230, 81, 0, 0.1); }
    .card-checkbox { position: absolute; top: 15px; left: 15px; width: 18px; height: 18px; cursor: pointer; }
    .card-img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); padding: 2px; margin: 0 auto 10px; }
    .card-name { font-size: 18px; font-weight: bold; color: #222; margin-bottom: 5px; }
    .card-id { font-size: 13px; font-weight: bold; color: var(--secondary); margin-bottom: 4px; }
    .card-mob { font-size: 13px; color: #666; }
    .card-status { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 10px; margin-top: 8px; font-weight: bold; }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    .btn { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-green { background: var(--success); color: white; }
    .btn-blue { background: var(--secondary); color: white; }
    .btn-orange { background: var(--primary); color: white; }
    .btn-yellow { background: #fbbc05; color: black; }
    .btn-red { background: var(--danger); color: white; grid-column: span 2; }
    
    .form-box { display: none; background: white; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-top: 10px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    
    .fee-badge { padding: 4px 8px; border-radius: 6px; display: inline-block; margin: 2px; font-size: 11px; font-weight: bold; background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
    .extra-badge { background: #e8f0fe; color: #1a73e8; border: 1px solid #d0e1fd; }
    
    #common-modal, #password-modal, #details-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
    .modal-content { background:white; padding:25px; border-radius:25px; text-align:center; width: 320px; position: relative; max-height: 80vh; overflow-y: auto; }
    
    .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .calc-btn { background: #f0f0f0; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .scratch-container { position: relative; width: 200px; height: 200px; background: #fff; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 4px solid #eee; }
    #scratch-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; z-index: 2; }
    .reward-under { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; background: #fff; top:0; left:0;}
    .form-group { text-align: left; margin: 12px 0; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #475569; }
    
    .details-list { text-align: left; margin: 15px 0; font-size: 14px; line-height: 1.6; }
    .details-list p { margin: 8px 0; border-bottom: 1px dashed #eee; padding-bottom: 4px; }
  </style>
</head>
<body oncontextmenu="return false;">

  <header>
    <h1>SNT Computer Institute</h1>
    <button class="btn" style="padding:8px 12px; background:rgba(255,255,255,0.2);" onclick="location.reload()">🔄</button>
  </header>

  <div class="search-container">
    <input type="text" id="search-input" placeholder="नाम, मोबाइल या Gmail से खोजें..." onkeyup="filterCards()">
  </div>

  <div class="student-grid" id="students-container"></div>

  <div class="controls">
    <button class="btn btn-green" onclick="showForm('payment-form')">💰 फीस जोड़ें</button>
    <button class="btn btn-blue" onclick="showForm('extra-charge-form')">📑 अन्य चार्ज</button>
    <button class="btn btn-orange" onclick="openPinGate('attendance')">📝 अटेंडेंस भरें</button>
    <button class="btn btn-yellow" onclick="openScracityModal()">🎁 स्क्रैच कूपन</button>
    <button class="btn btn-red" onclick="openPinGate('delete')">🗑️ चयनित डेटा डिलीट करें</button>
  </div>

  <div id="payment-form" class="form-box">
    <h3>मासिक फीस जमा करें</h3>
    <select id="p-month"></select>
    <input type="number" id="p-amount" placeholder="राशि ₹" value="500">
    <div class="form-group">
      <label>Transaction UTR / Ref No. <span style="color:gray;">(वैकल्पिक)</span></label>
      <input type="text" id="p-utr" placeholder="12-digit UPI Ref/UTR No." maxlength="12">
    </div>
    <div class="form-group">
      <label>Upload Payment Screenshot <span style="color:gray;">(वैकल्पिक)</span></label>
      <input type="file" id="p-screenshot" accept="image/*">
    </div>
    <button class="btn btn-green" style="width:100%" onclick="genQRCode('fee')">QR कोड दिखाएँ</button>
  </div>

  <div id="extra-charge-form" class="form-box">
    <h3>अन्य चार्ज</h3>
    <input type="text" id="e-reason" placeholder="कारण (जैसे- Exam, Card)">
    <input type="number" id="e-amount" placeholder="राशि ₹">
    <div class="form-group">
      <label>Transaction UTR / Ref No. <span style="color:gray;">(वैकल्पिक)</span></label>
      <input type="text" id="e-utr" placeholder="12-digit UPI Ref/UTR No." maxlength="12">
    </div>
    <div class="form-group">
      <label>Upload Payment Screenshot <span style="color:gray;">(वैकल्पिक)</span></label>
      <input type="file" id="e-screenshot" accept="image/*">
    </div>
    <button class="btn btn-blue" style="width:100%" onclick="genQRCode('extra')">QR कोड दिखाएँ</button>
  </div>

  <div id="password-modal">
    <div class="modal-content">
        <h3 id="pin-msg">🔒 पिन दर्ज करें</h3>
        <input type="password" id="pin-input" readonly placeholder="******" style="text-align:center; font-size:20px; border:2px solid #eee; width:80%;">
        <div class="calc-grid">
            <button class="calc-btn" onclick="addPin('1')">1</button><button class="calc-btn" onclick="addPin('2')">2</button><button class="calc-btn" onclick="addPin('3')">3</button>
            <button class="calc-btn" onclick="addPin('4')">4</button><button class="calc-btn" onclick="addPin('5')">5</button><button class="calc-btn" onclick="addPin('6')">6</button>
            <button class="calc-btn" onclick="addPin('7')">7</button><button class="calc-btn" onclick="addPin('8')">8</button><button class="calc-btn" onclick="addPin('9')">9</button>
            <button class="calc-btn" style="color:red" onclick="clearPin()">C</button><button class="calc-btn" onclick="addPin('0')">0</button>
            <button class="calc-btn" style="color:green" onclick="verifyPin()">OK</button>
        </div>
        <button onclick="closePinModal()" style="margin-top:15px; border:none; background:none; cursor:pointer; color:gray;">रद्द करें</button>
    </div>
  </div>

  <div id="details-modal">
    <div class="modal-content" style="width: 350px;">
        <h3>📋 विद्यार्थी का विवरण</h3>
        <div id="student-detail-img-container"></div>
        <div class="details-list" id="details-content"></div>
        <button class="btn btn-orange" style="width:100%" onclick="document.getElementById('details-modal').style.display='none'">बंद करें</button>
    </div>
  </div>

  <div id="common-modal">
      <div class="modal-content" id="qr-ui" style="display:none;">
          <h3 id="qr-title">Sandeep Kumar</h3>
          <div id="qrcode-container" style="display: flex; justify-content: center; margin: 15px 0;"></div>
          <p id="qr-text"></p>
          <button class="btn btn-green" id="confirm-btn">✅ भुगतान सफल</button>
          <button onclick="closeModal()" style="margin-top:10px; border:none; background:none; color:gray; cursor:pointer;">बंद करें</button>
      </div>

      <div class="modal-content" id="scratch-ui" style="display:none;">
          <h3 id="scratch-student-name">विद्यार्थी का नाम</h3>
          <p>कार्ड को स्क्रैच करें और इनाम जीतें!</p>
          <div class="scratch-container">
              <div class="reward-under">
                  <h2 style="color:var(--success); margin:0; font-size:32px;" id="reward-amount">₹0</h2>
                  <span style="font-size:14px; color:#666;">कैशबैक बोनस</span>
              </div>
              <canvas id="scratch-canvas" width="200" height="200"></canvas>
          </div>
          <button class="btn btn-orange" style="width:100%; display:none;" id="save-reward-btn">🎁 अकाउंट में जोड़ें</button>
          <button onclick="closeModal()" style="margin-top:15px; border:none; background:none; color:gray; cursor:pointer;">बंद करें</button>
      </div>
  </div>

  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA",
        authDomain: "snt-computer-institute.firebaseapp.com",
        databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com/",
        projectId: "snt-computer-institute",
        appId: "1:117580784781:web:73ba19d2d008beb3a5eec4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let usersData = [];
    let currentId = null;
    let enteredPin = "";
    let pinTarget = "";
    let generatedReward = 0;
    let isScratched = false;
    const MASTER_PIN = "912919";
    const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function fetchStudents() {
        db.ref('students').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('students-container');
            container.innerHTML = '';
            usersData = [];
            if (data) {
                Object.keys(data).forEach((key) => {
                    let u = data[key]; u.id = key; usersData.push(u);
                    
                    let statusColor = u.registrationStatus === 'Pending' ? '#d32f2f' : '#2e7d32';
                    let statusBg = u.registrationStatus === 'Pending' ? '#ffebee' : '#e8f5e9';

                    // टेबल की जगह कार्ड जनरेट कर रहे हैं
                    container.innerHTML += `
                      <div class="student-card" onclick="openStudentDetails('${key}', event)">
                        <input type="checkbox" class="st-check card-checkbox" data-id="${key}" onclick="event.stopPropagation();">
                        <img src="${u.profilePicture || 'SNT.jpg'}" class="card-img">
                        <div class="card-name">${u.name}</div>
                        <div class="card-id">ID: ${u.studentId || 'N/A'}</div>
                        <div class="card-mob">📞 ${u.mobile || 'N/A'}</div>
                        <span class="card-status" style="color:${statusColor}; background:${statusBg};">${u.registrationStatus || 'Paid'}</span>
                      </div>
                    `;
                });
            }
        });
    }

    // कार्ड पर क्लिक करने पर बाकी डिटेल्स दिखाने वाला फंक्शन
    function openStudentDetails(id, event) {
        const u = usersData.find(student => student.id === id);
        if(!u) return;

        let pHist = (u.paymentHistory || []).map(p => `<span class="fee-badge">${p.month}: ₹${p.amount}</span>`).join('');
        let eHist = (u.extraHistory || []).map(e => `<span class="fee-badge extra-badge">${e.reason}: ₹${e.amount}</span>`).join('');

        document.getElementById('student-detail-img-container').innerHTML = `<img src="${u.profilePicture || 'SNT.jpg'}" class="card-img" style="width:90px; height:90px;">`;
        
        document.getElementById('details-content').innerHTML = `
            <p><b>नाम:</b> ${u.name}</p>
            <p><b>Student ID:</b> ${u.studentId || 'N/A'}</p>
            <p><b>कोर्स:</b> ${u.courses || 'N/A'}</p>
            <p><b>DOB:</b> ${u.dob || 'N/A'}</p>
            <p><b>मोबाइल:</b> ${u.mobile || 'N/A'}</p>
            <p><b>Gmail:</b> ${u.email || 'N/A'}</p>
            <p><b>इनाम राशि:</b> <span style="color:var(--success); font-weight:bold;">₹${u.wonCash || 0}</span></p>
            <div style="margin-top:10px;">
                <b>फीस इतिहास:</b>
                <div style="margin-top:5px;">${pHist || 'कोई रिकॉर्ड नहीं'} ${eHist}</div>
            </div>
        `;
        document.getElementById('details-modal').style.display = 'flex';
    }

    function openPinGate(target) {
        if(target === 'delete' && document.querySelectorAll('.st-check:checked').length === 0) return alert("विद्यार्थी चुनें!");
        pinTarget = target; enteredPin = "";
        document.getElementById('pin-input').value = "";
        document.getElementById('password-modal').style.display = 'flex';
    }
    function addPin(num) { if(enteredPin.length < 6) { enteredPin += num; document.getElementById('pin-input').value = enteredPin.replace(/./g, '●'); } }
    function clearPin() { enteredPin = ""; document.getElementById('pin-input').value = ""; }
    function closePinModal() { document.getElementById('password-modal').style.display = 'none'; }

    function verifyPin() {
        if(enteredPin === MASTER_PIN) {
            if(pinTarget === 'attendance') {
                window.location.href = 'attendance.html'; // डायरेक्ट रीडायरेक्ट
            }
            else if(pinTarget === 'delete') deleteRows();
            closePinModal();
        } else { alert("गलत पिन!"); clearPin(); }
    }

    function deleteRows() {
        if(!confirm("क्या आप वाकई हटाना चाहते हैं?")) return;
        document.querySelectorAll('.st-check:checked').forEach(c => db.ref('students/' + c.dataset.id).remove());
    }

    function showForm(id) {
        document.querySelectorAll('.form-box').forEach(f => f.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if (id === 'payment-form') {
            const sel = document.querySelector('.st-check:checked');
            if (sel) { populateMonths(usersData.find(u => u.id === sel.dataset.id)); }
            else { alert("विद्यार्थी चुनें!"); document.getElementById(id).style.display = 'none'; }
        }
    }

    function populateMonths(student) {
        const select = document.getElementById('p-month'); select.innerHTML = '<option value="Admission Fee">Admission Fee</option>';
        MONTHS.forEach(m => {
            let paid = (student.paymentHistory || []).some(p => p.month === m);
            select.innerHTML += `<option value="${m}" ${paid?'disabled':''}>${m} ${paid?'(Paid)':''}</option>`;
        });
    }

    function genQRCode(type) {
        const sel = document.querySelector('.st-check:checked');
        if(!sel) return alert("विद्यार्थी चुनें!");

        currentId = sel.dataset.id;
        const student = usersData.find(u => u.id === currentId);
        let amt = type==='fee'? document.getElementById('p-amount').value: document.getElementById('e-amount').value;
        let label = type==='fee'? document.getElementById('p-month').value: document.getElementById('e-reason').value;

        if(!amt) return alert("कृपया राशि दर्ज करें!");

        document.getElementById('common-modal').style.display='flex';
        document.getElementById('qr-ui').style.display='block';
        document.getElementById('scratch-ui').style.display='none';
        document.getElementById('qrcode-container').innerHTML = "";

        new QRCode(document.getElementById('qrcode-container'), {
            text: `upi://pay?pa=9580807075@ybl&pn=Sandeep%20Kumar&am=${amt}&cu=INR&tn=SNT_${student.name}_${label}`,
            width:180, height:180
        });
        document.getElementById('confirm-btn').onclick = () => savePaymentDirect(type, amt, label);
    }

    function savePaymentDirect(type, amt, label) {
        let utr = type==='fee'? document.getElementById('p-utr').value.trim(): document.getElementById('e-utr').value.trim();
        let fileInput = type==='fee'? document.getElementById('p-screenshot'): document.getElementById('e-screenshot');
        let sc = fileInput.files[0];

        let student = usersData.find(u => u.id === currentId);
        
        const updateDataInFirebase = (screenshotData = "") => {
            let payData = { month: label, amount: amt, date: new Date().toLocaleDateString(), utrNumber: utr || "N/A", paymentScreenshot: screenshotData };
            
            if(type === 'fee') {
                if(!student.paymentHistory) student.paymentHistory = [];
                student.paymentHistory.push(payData);
                if(label === "Admission Fee") {
                    student.registrationStatus = "Paid";
                    student.utrNumber = utr || "N/A";
                    student.paymentScreenshot = screenshotData;
                }
            } else {
                if(!student.extraHistory) student.extraHistory = [];
                student.extraHistory.push({ reason: label, amount: amt, date: new Date().toLocaleDateString(), utrNumber: utr || "N/A", paymentScreenshot: screenshotData });
            }

            db.ref('students/' + currentId).update(student).then(() => {
                alert("Payment Saved!"); 
                if(type === 'fee') {
                    document.getElementById('p-utr').value = "";
                    document.getElementById('p-screenshot').value = "";
                } else {
                    document.getElementById('e-utr').value = "";
                    document.getElementById('e-screenshot').value = "";
                }
                closeModal();
            });
        };

        if(sc) {
            const reader = new FileReader();
            reader.onload = function() { updateDataInFirebase(reader.result); };
            reader.readAsDataURL(sc);
        } else {
            updateDataInFirebase("");
        }
    }

    function openScracityModal() {
        const sel = document.querySelector('.st-check:checked');
        if (!sel) { return alert("कृपया पहले किसी विद्यार्थी को चुनें!"); }
        
        currentId = sel.dataset.id;
        const student = usersData.find(u => u.id === currentId);
        
        document.getElementById('scratch-student-name').innerText = student.name;
        generatedReward = Math.floor(Math.random() * 46) + 5;
        document.getElementById('reward-amount').innerText = "₹" + generatedReward;
        
        document.getElementById('common-modal').style.display = 'flex';
        document.getElementById('qr-ui').style.display = 'none';
        document.getElementById('scratch-ui').style.display = 'block';
        document.getElementById('save-reward-btn').style.display = 'none';
        isScratched = false;

        initScratchCanvas();
    }

    function initScratchCanvas() {
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#b0bec5';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#37474f';
        ctx.font = 'bold 16px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('यहाँ स्क्रैच करें', canvas.width / 2, canvas.height / 2);
        
        let isDrawing = false;
        
        function scratch(e) {
            if (!isDrawing) return;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 30;
            ctx.lineCap = 'round';
            
            let rect = canvas.getBoundingClientRect();
            let x = (e.clientX || e.touches[0].clientX) - rect.left;
            let y = (e.clientY || e.touches[0].clientY) - rect.top;
            
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);

            if(!isScratched) {
                isScratched = true;
                document.getElementById('save-reward-btn').style.display = 'block';
            }
        }
        
        canvas.onmousedown = (e) => { isDrawing = true; ctx.beginPath(); scratch(e); };
        canvas.onmousemove = scratch;
        canvas.onmouseup = () => { isDrawing = false; };
        
        canvas.ontouchstart = (e) => { isDrawing = true; ctx.beginPath(); scratch(e); };
        canvas.ontouchmove = scratch;
        canvas.ontouchend = () => { isDrawing = false; };

        document.getElementById('save-reward-btn').onclick = function() {
            let student = usersData.find(u => u.id === currentId);
            let currentReward = parseInt(student.wonCash || 0);
            let newReward = currentReward + generatedReward;
            
            db.ref('students/' + currentId).update({ wonCash: newReward }).then(() => {
                alert(`सफलतापूर्वक ₹${generatedReward} इनाम राशि जोड़ दी गयी है!`);
                closeModal();
            });
        };
    }

    function closeModal() { document.getElementById('common-modal').style.display='none'; }
    
    // कार्ड्स फ़िल्टर करने का नया फंक्शन
    function filterCards() {
        let input = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.student-card').forEach(card => { 
            card.style.display = card.innerText.toLowerCase().includes(input) ? '' : 'none'; 
        });
    }
    window.onload = fetchStudents;
  </script>
</body>
</html>
