<!DOCTYPE html>
<html lang="hi">
<head>
  <link rel="icon" type="image/jpeg" href="SNT.jpg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNT Institute - Admin Dashboard Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    :root { --primary: #e65100; --secondary: #1a73e8; --success: #2e7d32; --danger: #d32f2f; --bg: #fffbf5; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; user-select: none; }
    header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(230, 81, 0, 0.2); }
    header h1 { font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
    
    .search-container { margin: 15px 0; }
    #search-input { width: 100%; padding: 14px 20px; border: 2px solid #ddd; border-radius: 30px; outline: none; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
    #search-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(230,81,0,0.1); }

    /* Student Grid Layout */
    .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
    
    /* Card Design with Continuous Animated Border */
    .student-card { 
      background: white; 
      border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
      display: flex; 
      flex-direction: column;
      cursor: pointer; 
      transition: transform 0.2s, box-shadow 0.2s; 
      position: relative; 
      overflow: hidden;
      border: 3px solid transparent;
      border-image: linear-gradient(45deg, #e65100, #1a73e8, #e65100) 1;
      animation: borderRotate 3s linear infinite, glow 1.5s ease-in-out infinite alternate;
    }
    .student-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    
    /* Card Colored Header */
    .card-header {
      background: linear-gradient(135deg, #e65100, #ff8000);
      color: white;
      padding: 8px 12px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: bold;
    }

    /* Card Main Content Area */
    .card-body {
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    /* Checkbox Style inside Header */
    .card-header input[type="checkbox"] { 
      transform: scale(1.2); 
      z-index: 10; 
      cursor: pointer; 
      margin: 0;
    }
    
    .student-card.selected-card {
      background: #fff8f0;
      box-shadow: 0 0 15px rgba(230, 81, 0, 0.3);
    }
    
    @keyframes borderRotate {
      0% { border-image-source: linear-gradient(45deg, #e65100, #1a73e8, #e65100); }
      50% { border-image-source: linear-gradient(225deg, #1a73e8, #e65100, #1a73e8); }
      100% { border-image-source: linear-gradient(45deg, #e65100, #1a73e8, #e65100); }
    }

    @keyframes glow {
      from { box-shadow: 0 0 5px rgba(230,81,0,0.2); }
      to { box-shadow: 0 0 12px rgba(26,115,232,0.4); }
    }

    .profile-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); padding: 2px; }
    .student-info { flex: 1; }
    .student-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #222; }
    .student-info p { margin: 2px 0; font-size: 13px; color: #666; }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    .btn { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-green { background: var(--success); color: white; }
    .btn-blue { background: var(--secondary); color: white; }
    .btn-orange { background: var(--primary); color: white; }
    .btn-yellow { background: #fbbc05; color: black; }
    .btn-red { background: var(--danger); color: white; grid-column: span 2; }
    
    .form-box { display: none; background: white; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-top: 10px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    
    .fee-badge { padding: 4px 8px; border-radius: 6px; display: inline-block; margin: 2px; font-size: 11px; font-weight: bold; background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
    .extra-badge { background: #e8f0fe; color: #1a73e8; border: 1px solid #d0e1fd; }
    
    #common-modal, #password-modal, #detail-modal, #captcha-modal, #scratch-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
    .modal-content { background:white; padding:25px; border-radius:25px; text-align:center; width: 340px; position: relative; max-height: 80vh; overflow-y: auto; }
    
    /* Captcha and Scratch Canvas Layout */
    .captcha-box { background: #f0f0f0; font-size: 24px; font-weight: bold; letter-spacing: 5px; padding: 10px; border-radius: 10px; margin: 15px 0; display: inline-block; font-style: italic; color: #1a73e8; user-select: none; border: 1px dashed #333; }
    .scratch-container { position: relative; width: 200px; height: 200px; margin: 20px auto; background: #fff; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
    .scratch-prize { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; color: #333; z-index: 1; background: #fffde7; }
    #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; }

    .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .calc-btn { background: #f0f0f0; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    
    .detail-section { text-align: left; margin-top: 15px; background: #f9f9f9; padding: 12px; border-radius: 10px; font-size: 14px; }
    .detail-section b { color: #555; }
    
    .download-avatar { cursor: pointer; transition: transform 0.2s; position: relative; display: inline-block; }
    .download-avatar:hover { transform: scale(1.05); }
    .download-avatar::after { content: "⬇ डाउनलोड करें"; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; opacity: 0; transition: 0.2s; }
    .download-avatar:hover::after { opacity: 1; }
  </style>
</head>
<body oncontextmenu="return false;">

  <header>
    <h1>SNT Computer Institute</h1>
    <button class="btn" style="padding:8px 12px; background:rgba(255,255,255,0.2);" onclick="location.reload()">🔄</button>
  </header>

  <div class="search-container">
    <input type="text" id="search-input" placeholder="नाम, मोबाइल या Gmail से खोजें..." onkeyup="filterCards()">
  </div>

  <div class="student-grid" id="student-container"></div>

  <div class="controls">
    <button class="btn btn-green" onclick="showForm('payment-form')">💰 फीस जोड़ें</button>
    <button class="btn btn-blue" onclick="showForm('extra-charge-form')">📑 अन्य चार्ज</button>
    <button class="btn btn-orange" onclick="startVerificationFlow('attendance')">📝 अटेंडेंस भरें</button>
    <button class="btn btn-yellow" onclick="openScratchCardSystem()">🎁 स्क्रैच कूपन</button>
    <button class="btn btn-red" onclick="startVerificationFlow('delete')">🗑️ चयनित डेटा डिलीट करें</button>
  </div>

  <div id="payment-form" class="form-box">
    <h3>मासिक फीस जमा करें</h3>
    <select id="p-month"></select>
    <input type="number" id="p-amount" placeholder="राशि ₹" value="500">
    <button class="btn btn-green" style="width:100%" onclick="genQRCode('fee')">QR कोड दिखाएँ</button>
  </div>

  <div id="extra-charge-form" class="form-box">
    <h3>अन्य चार्ज</h3>
    <input type="text" id="e-reason" placeholder="कारण (जैसे- Exam, Card)">
    <input type="number" id="e-amount" placeholder="राशि ₹">
    <button class="btn btn-blue" style="width:100%" onclick="genQRCode('extra')">QR कोड दिखाएँ</button>
  </div>

  <div id="scratch-modal">
    <div class="modal-content">
      <h3 style="margin:0;">🎁 स्टूडेंट स्क्रैच कूपन</h3>
      <p id="scratch-user-name" style="font-weight:bold; color:var(--primary); margin:5px 0;"></p>
      <div class="scratch-container">
        <div class="scratch-prize" id="prize-display">
          <span style="font-size:30px;">🎉</span>
          <span id="prize-text">₹0</span>
        </div>
        <canvas id="scratch-canvas" width="200" height="200"></canvas>
      </div>
      <button class="btn btn-green" id="claim-prize-btn" style="width:100%; display:none;" onclick="saveScratchPrize()">✅ इनाम कलेक्ट करें</button>
      <button onclick="closeScratchModal()" style="margin-top:15px; border:none; background:none; cursor:pointer; color:gray;">बंद करें</button>
    </div>
  </div>

  <div id="captcha-modal">
    <div class="modal-content">
      <h3>🤖 सुरक्षा सत्यापन (Captcha)</h3>
      <p>आगे बढ़ने के लिए नीचे दिया गया कोड दर्ज करें:</p>
      <div class="captcha-box" id="captcha-display">0000</div>
      <button class="btn btn-blue" style="padding: 5px 10px; display: inline-flex; margin-bottom: 10px;" onclick="generateCaptcha()">🔄 कोड बदलें</button>
      <input type="text" id="captcha-input" placeholder="यहाँ कैप्चा कोड लिखें" style="text-align:center; font-size:18px; text-transform:uppercase;">
      <button class="btn btn-green" style="width:100%; margin-top:10px;" onclick="verifyCaptcha()">सत्यापित करें</button>
      <button onclick="closeCaptchaModal()" style="margin-top:15px; border:none; background:none; cursor:pointer; color:gray;">रद्द करें</button>
    </div>
  </div>

  <div id="password-modal">
    <div class="modal-content">
        <h3 id="pin-msg">🔒 पिन दर्ज करें</h3>
        <input type="password" id="pin-input" readonly placeholder="******" style="text-align:center; font-size:20px; border:2px solid #eee; width:80%;">
        <div class="calc-grid">
            <button class="calc-btn" onclick="addPin('1')">1</button><button class="calc-btn" onclick="addPin('2')">2</button><button class="calc-btn" onclick="addPin('3')">3</button>
            <button class="calc-btn" onclick="addPin('4')">4</button><button class="calc-btn" onclick="addPin('5')">5</button><button class="calc-btn" onclick="addPin('6')">6</button>
            <button class="calc-btn" onclick="addPin('7')">7</button><button class="calc-btn" onclick="addPin('8')">8</button><button class="calc-btn" onclick="addPin('9')">9</button>
            <button class="calc-btn" style="color:red" onclick="clearPin()">C</button><button class="calc-btn" onclick="addPin('0')">0</button>
            <button class="calc-btn" style="color:green" onclick="verifyPin()">OK</button>
        </div>
        <button onclick="closePinModal()" style="margin-top:15px; border:none; background:none; cursor:pointer; color:gray;">रद्द करें</button>
    </div>
  </div>

  <div id="detail-modal">
    <div class="modal-content">
      <h3 style="margin-top:0;">विद्यार्थी का पूरा विवरण</h3>
      <div id="detail-content"></div>
      <button class="btn btn-blue" style="width:100%; margin-top:15px;" onclick="closeDetailModal()">बंद करें</button>
    </div>
  </div>

  <div id="common-modal">
      <div class="modal-content" id="qr-ui" style="display:none;">
          <h3 id="qr-title">Sandeep Kumar</h3>
          <div id="qrcode-container" style="display: flex; justify-content: center; margin: 15px 0;"></div>
          <p id="qr-text"></p>
          <button class="btn btn-green" id="confirm-btn">✅ भुगतान सफल</button>
          <button onclick="closeModal()" style="margin-top:10px; border:none; background:none; color:gray; cursor:pointer;">बंद करें</button>
      </div>
  </div>

  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA",
        authDomain: "snt-computer-institute.firebaseapp.com",
        databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com/",
        projectId: "snt-computer-institute",
        appId: "1:117580784781:web:73ba19d2d008beb3a5eec4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let usersData = [];
    let currentId = null;
    let enteredPin = "";
    let pinTarget = "";
    let generatedCaptchaCode = "";
    let currentPrizeAmount = 0;
    
    const MASTER_PIN = "912919";
    const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function fetchStudents() {
        db.ref('students').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('student-container');
            container.innerHTML = '';
            usersData = [];
            if (data) {
                Object.keys(data).forEach((key) => {
                    let u = data[key]; u.id = key; usersData.push(u);
                    
                    container.innerHTML += `
                      <div class="student-card" id="card-${key}" onclick="openStudentDetails('${key}', event)">
                        <div class="card-header">
                          <span>Action</span>
                          <input type="checkbox" class="st-check" data-id="${key}" onclick="toggleCardSelection('${key}', event)">
                        </div>
                        <div class="card-body">
                          <img src="${u.profilePicture || 'SNT.jpg'}" class="profile-img">
                          <div class="student-info">
                            <h3>${u.name}</h3>
                            <p><b>पिता का नाम:</b> ${u.fatherName || 'N/A'}</p>
                            <p><b>ID:</b> ${u.studentId || 'N/A'}</p>
                            <p><b>कोर्स:</b> <span class="fee-badge extra-badge" style="margin:0;">${u.courses ? u.courses : 'N/A'}</span></p>
                            <p><small style="color:${u.registrationStatus === 'Pending'?'red':'green'}">${u.registrationStatus || 'Paid'}</small></p>
                          </div>
                        </div>
                      </div>`;
                });
            }
        });
    }

    function toggleCardSelection(key, event) {
        event.stopPropagation();
        const card = document.getElementById(`card-${key}`);
        const checkbox = card.querySelector('.st-check');
        if(checkbox.checked) {
            card.classList.add('selected-card');
        } else {
            card.classList.remove('selected-card');
        }
    }

    /* --- SCRATCH COUPON CODES --- */
    function openScratchCardSystem() {
        const sel = document.querySelector('.st-check:checked');
        if(!sel) return alert("कृपया स्क्रैच कूपन के लिए पहले विद्यार्थी चुनें!");
        
        currentId = sel.dataset.id;
        let student = usersData.find(u => u.id === currentId);
        document.getElementById('scratch-user-name').innerText = `विद्यार्थी: ${student.name}`;
        
        // Random Prize Generator logic
        const prizes = [10, 20, 30, 50, 100, 0, 5, 0];
        let randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
        currentPrizeAmount = randomPrize;

        if(randomPrize > 0) {
            document.getElementById('prize-text').innerText = `₹${randomPrize} कैश`;
        } else {
            document.getElementById('prize-text').innerText = "Better Luck Next Time!";
        }

        document.getElementById('claim-prize-btn').style.display = 'none';
        document.getElementById('scratch-modal').style.display = 'flex';
        initScratchCanvas();
    }

    function initScratchCanvas() {
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        
        // Fill canvas overlay color (Gray)
        ctx.fillStyle = '#b0bec5';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Text instructions on scratch area
        ctx.fillStyle = '#37474f';
        ctx.font = 'bold 16px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('यहाँ स्क्रैच करें!', canvas.width / 2, canvas.height / 2);

        let isDrawing = false;

        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            let rect = canvas.getBoundingClientRect();
            let x, y;
            
            if(e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();
            
            checkScratchPercentage();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        
        canvas.addEventListener('touchstart', () => isDrawing = true);
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', scratch);

        function checkScratchPercentage() {
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let pixels = imgData.data;
            let transparentPixels = 0;
            
            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i + 3] === 0) transparentPixels++;
            }
            
            let percentage = (transparentPixels / (canvas.width * canvas.height)) * 100;
            if (percentage > 50) { // If 50% area is scratched, clear fully and show button
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('claim-prize-btn').style.display = 'block';
            }
        }
    }

    function saveScratchPrize() {
        let student = usersData.find(u => u.id === currentId);
        let absoluteCash = parseInt(student.wonCash || 0) + parseInt(currentPrizeAmount);
        
        db.ref('students/' + currentId).update({ wonCash: absoluteCash }).then(() => {
            alert(`सफलतापूर्वक ₹${currentPrizeAmount} विद्यार्थी के वॉलेट में जोड़ दिए गए हैं!`);
            closeScratchModal();
        });
    }

    function closeScratchModal() { document.getElementById('scratch-modal').style.display = 'none'; }

    /* --- CAPTCHA FLOW VALIDATION --- */
    function startVerificationFlow(target) {
        if(target === 'delete' && document.querySelectorAll('.st-check:checked').length === 0) {
            return alert("कृपया पहले विद्यार्थी चुनें!");
        }
        pinTarget = target;
        openCaptchaModal();
    }

    function openCaptchaModal() {
        document.getElementById('captcha-input').value = "";
        generateCaptcha();
        document.getElementById('captcha-modal').style.display = 'flex';
    }

    function closeCaptchaModal() { document.getElementById('captcha-modal').style.display = 'none'; }

    function generateCaptcha() {
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let code = "";
        for (let i = 0; i < 4; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        generatedCaptchaCode = code;
        document.getElementById('captcha-display').innerText = code;
    }

    function verifyCaptcha() {
        let inputVal = document.getElementById('captcha-input').value.trim().toUpperCase();
        if(inputVal === generatedCaptchaCode) {
            closeCaptchaModal();
            openPinGate();
        } else {
            alert("गलत कैप्चा कोड! कृपया पुनः प्रयास करें।");
            generateCaptcha();
            document.getElementById('captcha-input').value = "";
        }
    }

    function openPinGate() {
        enteredPin = "";
        document.getElementById('pin-input').value = "";
        document.getElementById('password-modal').style.display = 'flex';
    }

    function addPin(num) { if(enteredPin.length < 6) { enteredPin += num; document.getElementById('pin-input').value = enteredPin.replace(/./g, '●'); } }
    function clearPin() { enteredPin = ""; document.getElementById('pin-input').value = ""; }
    function closePinModal() { document.getElementById('password-modal').style.display = 'none'; }

    function verifyPin() {
        if(enteredPin === MASTER_PIN) {
            if(pinTarget === 'attendance') {
                window.location.href = 'attendence.html';
            }
            else if(pinTarget === 'delete') deleteRows();
            closePinModal();
        } else { alert("गलत पिन!"); clearPin(); }
    }

    function deleteRows() {
        if(!confirm("क्या आप वाकई हटाना चाहते हैं?")) return;
        document.querySelectorAll('.st-check:checked').forEach(c => db.ref('students/' + c.dataset.id).remove());
    }

    function downloadImage(imgUrl, studentName) {
        if(!imgUrl || imgUrl === 'SNT.jpg') {
            alert("डिफ़ॉल्ट इमेज डाउनलोड नहीं की जा सकती!");
            return;
        }
        const xhr = new XMLHttpRequest();
        xhr.open("GET", imgUrl, true);
        xhr.responseType = "blob";
        xhr.onload = function() {
            const urlCreator = window.URL || window.webkitURL;
            const imageUrl = urlCreator.createObjectURL(this.response);
            const tag = document.createElement('a');
            tag.href = imageUrl;
            tag.download = (studentName || 'Student') + "_Profile.jpg";
            document.body.appendChild(tag);
            tag.click();
            document.body.removeChild(tag);
        };
        xhr.send();
    }

    function openStudentDetails(id, event) {
        if(event.target.type === 'checkbox' || event.target.closest('.card-header')) return;
        
        let u = usersData.find(student => student.id === id);
        if(!u) return;

        let pHist = (u.paymentHistory || []).map(p => `<span class="fee-badge">${p.month}: ₹${p.amount}</span>`).join('');
        let eHist = (u.extraHistory || []).map(e => `<span class="fee-badge extra-badge">${e.reason}: ₹${e.amount}</span>`).join('');

        let imgPath = u.profilePicture || 'SNT.jpg';
        let content = `
          <div class="download-avatar" onclick="downloadImage('${imgPath}', '${u.name}')">
            <img src="${imgPath}" style="width:90px; height:90px; border-radius:50%; object-fit:cover; margin-bottom:10px; border: 3px solid var(--primary);">
          </div>
          <h3>${u.name}</h3>
          <div class="detail-section">
            <p><b>पिता का नाम:</b> ${u.fatherName || 'N/A'}</p>
            <p><b>Student ID:</b> ${u.studentId || 'N/A'}</p>
            <p><b>कोर्स:</b> ${u.courses || 'N/A'}</p>
            <p><b>मोबाइल:</b> ${u.mobile || 'N/A'}</p>
            <p><b>Gmail:</b> ${u.email || 'N/A'}</p>
            <p><b>रजिस्ट्रेशन स्थिति:</b> ${u.registrationStatus || 'Paid'}</p>
            <p><b>जीते गए इनाम:</b> ₹${u.wonCash || 0}</p>
          </div>
          <h4 style="margin:15px 0 5px 0; text-align:left;">फीस इतिहास:</h4>
          <div style="text-align:left;">${pHist || '<p style="color:gray; font-size:12px; margin:5px 0;">कोई रिकॉर्ड नहीं</p>'}</div>
          <h4 style="margin:15px 0 5px 0; text-align:left;">अन्य चार्ज विवरण:</h4>
          <div style="text-align:left;">${eHist || '<p style="color:gray; font-size:12px; margin:5px 0;">कोई रिकॉर्ड नहीं</p>'}</div>
        `;

        document.getElementById('detail-content').innerHTML = content;
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function closeDetailModal() { document.getElementById('detail-modal').style.display = 'none'; }

    function showForm(id) {
        document.querySelectorAll('.form-box').forEach(f => f.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if (id === 'payment-form') {
            const sel = document.querySelector('.st-check:checked');
            if (sel) { populateMonths(usersData.find(u => u.id === sel.dataset.id)); }
            else { alert("विद्यार्थी चुनें!"); document.getElementById(id).style.display = 'none'; }
        }
    }

    function populateMonths(student) {
        const select = document.getElementById('p-month'); select.innerHTML = '<option value="Admission Fee">Admission Fee</option>';
        MONTHS.forEach(m => {
            let paid = (student.paymentHistory || []).some(p => p.month === m);
            select.innerHTML += `<option value="${m}" ${paid?'disabled':''}>${m} ${paid?'(Paid)':''}</option>`;
        });
    }

    function genQRCode(type) {
        const sel = document.querySelector('.st-check:checked');
        if(!sel) return alert("विद्यार्थी चुनें!");
        currentId = sel.dataset.id;
        const student = usersData.find(u => u.id === currentId);
        let amt = type==='fee'? document.getElementById('p-amount').value: document.getElementById('e-amount').value;
        let label = type==='fee'? document.getElementById('p-month').value: document.getElementById('e-reason').value;

        if(!amt || !label) return alert("सभी फ़ील्ड भरें!");

        document.getElementById('common-modal').style.display='flex';
        document.getElementById('qr-ui').style.display='block';
        document.getElementById('qrcode-container').innerHTML = "";

        new QRCode(document.getElementById('qrcode-container'), {
            text: `upi://pay?pa=9580807075@ybl&pn=Sandeep%20Kumar&am=${amt}&cu=INR&tn=SNT_${student.name}_${label}`,
            width:180, height:180
        });
        document.getElementById('confirm-btn').onclick = () => savePaymentDirect(type, amt, label);
    }

    function savePaymentDirect(type, amt, label) {
        let student = usersData.find(u => u.id === currentId);
        let payData = { month: label, amount: amt, date: new Date().toLocaleDateString() };
        
        if(type === 'fee') {
            if(!student.paymentHistory) student.paymentHistory = [];
            student.paymentHistory.push(payData);
            if(label === "Admission Fee") {
                student.registrationStatus = "Paid";
            }
        } else {
            if(!student.extraHistory) student.extraHistory = [];
            student.extraHistory.push({ reason: label, amount: amt, date: new Date().toLocaleDateString() });
        }

        db.ref('students/' + currentId).update(student).then(() => {
            alert("Payment Saved!"); closeModal();
        });
    }

    function closeModal() { document.getElementById('common-modal').style.display='none'; }
    
    function filterCards() {
        let input = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.student-card').forEach(card => { 
            card.style.display = card.innerText.toLowerCase().includes(input)? 'flex' : 'none'; 
        });
    }
    window.onload = fetchStudents;
  </script>
</body>
</html>
