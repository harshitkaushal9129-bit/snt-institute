<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT | Official Digital Verification</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --snt-blue: #1e3a8a; --success: #059669; }
        body { background: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }

        .verify-card {
            max-width: 500px; width: 100%; background: #fff; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid var(--snt-blue);
            display: none; /* Data aane par dikhega */
        }

        .verify-header { background: #f8fafc; padding: 20px; text-align: center; border-bottom: 1px solid #e5e7eb; }
        .status-badge { 
            background: var(--success); color: white; padding: 5px 15px; border-radius: 20px; 
            font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 10px;
        }

        .student-photo { width: 100px; height: 120px; border: 3px solid var(--snt-blue); margin: 10px auto; display: block; object-fit: cover; border-radius: 8px; }

        .info-grid { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .info-label { color: #6b7280; font-size: 13px; font-weight: 600; }
        .info-value { color: #111827; font-size: 15px; font-weight: 700; text-align: right; }

        .official-seal { text-align: center; padding: 20px; background: #fffcf0; font-size: 12px; color: #854d0e; font-weight: bold; }
        
        /* Loading Spinner */
        #loader { text-align: center; margin-top: 50px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--snt-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Verifying Student Record...</p>
    </div>

    <div class="verify-card" id="verifyCard">
        <div class="verify-header">
            <div class="status-badge">✓ OFFICIALLY VERIFIED</div>
            <h2 style="margin:5px 0; color:var(--snt-blue);">SNT INSTITUTE</h2>
            <p style="margin:0; font-size:12px; color:#666;">Examination Verification Portal</p>
        </div>

        <img id="v-pic" src="" class="student-photo">

        <div class="info-grid">
            <div class="info-row"><span class="info-label">Student Name</span><span class="info-value" id="v-name">--</span></div>
            <div class="info-row"><span class="info-label">Father's Name</span><span class="info-value" id="v-fname">--</span></div>
            <div class="info-row"><span class="info-label">Registration ID</span><span class="info-value" id="v-id" style="color:var(--snt-blue);">--</span></div>
            <div class="info-row"><span class="info-label">Course</span><span class="info-value" id="v-course">--</span></div>
            <div class="info-row"><span class="info-label">Exam Status</span><span class="info-value" style="color:var(--success);">AUTHORIZED</span></div>
        </div>

        <div class="official-seal">
            Digitally Signed by SNT Computer Institute <br>
            Rudauli, Ayodhya, UP
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA", 
            authDomain: "snt-computer-institute.firebaseapp.com", 
            databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com/", 
            projectId: "snt-computer-institute", 
            appId: "1:117580784781:web:73ba19d2d008beb3a5eec4" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sid = urlParams.get('sid');

            if (sid) {
                verifyRecord(sid);
            } else {
                document.getElementById('loader').innerHTML = "<p style='color:red;'>Invalid Link: No Student ID Found.</p>";
            }
        };

        function verifyRecord(studentId) {
            db.ref('students').orderByChild('studentId').equalTo(studentId).once('value', (snap) => {
                const data = snap.val();
                if (data) {
                    const student = Object.values(data)[0];
                    
                    document.getElementById('v-name').innerText = student.name;
                    document.getElementById('v-fname').innerText = student.fatherName || student.fname || "N/A";
                    document.getElementById('v-id').innerText = student.studentId;
                    document.getElementById('v-course').innerText = (Array.isArray(student.courses)) ? student.courses[0] : (student.course || "N/A");
                    document.getElementById('v-pic').src = student.profilePicture || student.pic || "https://via.placeholder.com/100x120?text=No+Photo";
                    
                    // Show Card, Hide Loader
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('verifyCard').style.display = 'block';
                } else {
                    document.getElementById('loader').innerHTML = "<h3 style='color:red;'>Record Not Found!</h3><p>This is not a verified SNT Student ID.</p>";
                }
            });
        }
    </script>
</body>
</html>
