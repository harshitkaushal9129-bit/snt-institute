<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNT Attendance & Festival Calendar</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tp-header-red: #d32f2f;
            --present: #2e7d32;
            --absent: #c62828;
            --leave: #f59e0b;
            --star-gold: #ff9800;
            --bg-light: #f4f7f6;
            --holiday: #f57c00;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 10px; display: flex; justify-content: center; overflow-x: hidden; }

        #loader { position: fixed; inset: 0; background: white; z-index: 2500; display: flex; align-items: center; justify-content: center; flex-direction: column; font-weight: bold; color: var(--tp-header-red); }

        .calendar-card { background: white; width: 100%; max-width: 450px; border: 2px solid #ddd; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; position: relative; min-height: 600px; }

        .header { background: var(--tp-header-red); color: white; padding: 15px; text-align: center; }
        .st-profile-box { display: flex; align-items: center; gap: 12px; padding: 10px; background: rgba(0,0,0,0.15); border-radius: 8px; margin-top: 10px; text-align: left; }
        
        .st-photo-circle { 
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid white; 
            object-fit: cover; background: #fff;
        }

        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-bottom: 1px solid #eee; }
        .nav h2 { font-size: 1.1rem; margin: 0; color: #333; font-weight: 700; text-transform: capitalize; }
        .nav button { background: #f0f0f0; border: 1px solid #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; }
        .day-head { text-align: center; font-size: 12px; font-weight: bold; color: #666; padding: 12px 0; background: #f9f9f9; }
        .cell { height: 85px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .date-num { font-size: 18px; font-weight: 600; color: #333; z-index: 5; }
        .fest-star-marker { color: var(--star-gold); font-size: 10px; position: absolute; top: 6px; left: 6px; z-index: 10; }
        .today { background: #fffde7 !important; border: 1.5px solid #fbc02d !important; }
        .sunday .date-num { color: #d32f2f; }

        .att-status { position: absolute; bottom: 8px; height: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: block; border: 1.5px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        .bg-p { background: var(--present); }
        .bg-a { background: var(--absent); }
        .bg-l { background: var(--leave); }

        .fest-btn { position: fixed; right: 0; top: 50%; transform: translateY(-50%); background: var(--tp-header-red); color: white; padding: 15px 8px; writing-mode: vertical-rl; text-orientation: mixed; border-radius: 10px 0 0 10px; cursor: pointer; font-weight: bold; z-index: 100; }
        .sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: #fff; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2001; }
        .sidebar.active { right: 0; }
        .sidebar-header { background: var(--tp-header-red); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #fest-list-container { padding: 15px; overflow-y: auto; height: calc(100% - 80px); }
        .fest-item { background: #fff9f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--star-gold); font-size: 14px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; }
        .overlay.active { display: block; }

        .footer { padding: 15px; display: flex; justify-content: space-around; font-size: 10px; background: #fff; border-top: 1px solid #eee; flex-wrap: wrap; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-spinner fa-spin fa-3x mb-3"></i> डेटा लोड हो रहा है...</div>

<div class="fest-btn" onclick="toggleSidebar()"><i class="fas fa-calendar-alt"></i> त्यौहार सूची</div>
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>महीने के त्यौहार</h3>
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">&times;</span>
    </div>
    <div id="fest-list-container"></div>
</div>

<div class="calendar-card">
    <div class="header">
        <div style="font-weight: 700; font-size: 1.1rem;">SNT ATTENDANCE PORTAL</div>
        <div id="profile-area"></div> 
    </div>
    
    <div class="nav">
        <button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2 id="month-info"></h2>
        <button onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="grid">
        <div class="day-head">रवि</div><div class="day-head">सोम</div><div class="day-head">मंगल</div>
        <div class="day-head">बुध</div><div class="day-head">गुरु</div><div class="day-head">शुक्र</div><div class="day-head">शनि</div>
    </div>
    <div id="calendar-body" class="grid"></div>

    <div class="footer">
        <span><i class="fas fa-circle" style="color:var(--present)"></i> Present</span>
        <span><i class="fas fa-circle" style="color:var(--absent)"></i> Absent</span>
        <span><i class="fas fa-circle" style="color:var(--leave)"></i> Leave</span>
        <span><i class="fas fa-circle" style="color:var(--holiday)"></i> Holiday</span>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA",
        authDomain: "snt-computer-institute.firebaseapp.com",
        databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com/",
        projectId: "snt-computer-institute",
        appId: "1:117580784781:web:73ba19d2d008beb3a5eec4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let studentData = null;
    let displayDate = new Date();
    const today = new Date();

    const holidays = { "2026-01-26": "Republic Day", "2026-08-15": "Independence Day", "2026-10-02": "Gandhi Jayanti" };
    const fixedFestivals = { "2026": { "01-01": "नया साल", "14-01": "मकर संक्रांति", "26-01": "गणतंत्र दिवस", "15-02": "महाशिवरात्रि", "04-03": "होली", "15-08": "स्वतंत्रता दिवस", "25-12": "क्रिसमस" } };

    // Dashboard Match Logic: Email se student dhundna
    auth.onAuthStateChanged((user) => {
        if (user) {
            db.ref('students').orderByChild('email').equalTo(user.email).on('value', (snap) => {
                if (snap.exists()) {
                    const keys = Object.keys(snap.val());
                    studentData = snap.val()[keys[0]];

                    // Profile Section (Dashboard ki tarah)
                    const imgUrl = studentData.profilePicture || studentData.profilePic || 'SNT.jpg';
                    document.getElementById('profile-area').innerHTML = `
                        <div class="st-profile-box">
                            <img src="${imgUrl}" class="st-photo-circle" onerror="this.src='SNT.jpg'">
                            <div>
                                <b style="font-size: 1rem;">${studentData.name || '---'}</b><br>
                                <small style="opacity: 0.8;">ID: ${studentData.studentId || 'N/A'}</small>
                            </div>
                        </div>`;
                    
                    document.getElementById('loader').style.display = 'none';
                    renderCalendar();
                } else {
                    alert("No record found!");
                }
            });
        } else {
            window.location.href = "index.html";
        }
    });

    function renderCalendar() {
        if(!studentData) return;
        const body = document.getElementById('calendar-body');
        const year = displayDate.getFullYear(), month = displayDate.getMonth();
        
        document.getElementById('month-info').innerText = new Date(year, month).toLocaleString('hi-IN', {month:'long', year:'numeric'});

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        db.ref('attendance').on('value', snap => {
            const allData = snap.val() || {};
            body.innerHTML = '';

            for (let x = 0; x < firstDay; x++) body.innerHTML += `<div class="cell" style="background:#f9f9f9"></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const monthFmt = String(month + 1).padStart(2, '0');
                const dayFmt = String(day).padStart(2, '0');
                const dateKey = `${year}-${monthFmt}-${dayFmt}`; 
                
                // Attendance Match Logic: "RollNumber_YYYY-MM-DD" or "UID_YYYY-MM-DD"
                // Pehle hum studentId se check karenge, fir UID se agar zaroorat padi
                const rollID = `${studentData.studentId}_${dateKey}`;
                const userUID = auth.currentUser.uid;
                const uidID = `${userUID}_${dateKey}`;

                const attRecord = allData[rollID] || allData[uidID];
                const fKey = `${dayFmt}-${monthFmt}`;

                const isToday = new Date(year, month, day).toDateString() === today.toDateString();
                const isSunday = new Date(year, month, day).getDay() === 0;

                let dotHtml = "";
                let cellStyle = "";

                if (attRecord) {
                    const status = attRecord.status;
                    if(status === 'Present') dotHtml = `<span class="dot bg-p"></span>`;
                    else if(status === 'Absent') dotHtml = `<span class="dot bg-a"></span>`;
                    else if(status === 'Leave') dotHtml = `<span class="dot bg-l"></span>`;
                } else if (isSunday) {
                    cellStyle = "background: #fff3e0;";
                    dotHtml = `<span style="font-size:8px; color:var(--holiday); font-weight:bold;">SUNDAY</span>`;
                }

                body.innerHTML += `
                    <div class="cell ${isToday?'today':''} ${isSunday?'sunday':''}" style="${cellStyle}">
                        ${fixedFestivals[year] && fixedFestivals[year][fKey] ? '<i class="fas fa-star fest-star-marker"></i>' : ''}
                        <span class="date-num">${day}</span>
                        <div class="att-status">${dotHtml}</div>
                    </div>`;
            }
        });
    }

    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
        if(document.getElementById('sidebar').classList.contains('active')) updateFestivalList(); 
    }
    
    function closeAll() { 
        document.getElementById('sidebar').classList.remove('active'); 
        document.getElementById('overlay').classList.remove('active'); 
    }

    function updateFestivalList() {
        const container = document.getElementById('fest-list-container');
        const monthNum = String(displayDate.getMonth() + 1).padStart(2, '0');
        container.innerHTML = "";
        const fests = fixedFestivals[displayDate.getFullYear()] || {};
        Object.keys(fests).forEach(k => {
            if(k.split('-')[1] === monthNum) {
                container.innerHTML += `<div class="fest-item"><b>${k.split('-')[0]} तारीख</b>: ${fests[k]}</div>`;
            }
        });
    }

    function changeMonth(s) { displayDate.setMonth(displayDate.getMonth() + s); renderCalendar(); }
</script>
</body>
</html>
