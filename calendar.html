<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNT - Master Attendance Calendar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .student-row { display: grid; grid-template-columns: 1.5fr 1fr; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Badges */
        .badge-p { color: #4ade80; border: 1px solid #22c55e; background: rgba(34, 197, 94, 0.15); }
        .badge-a { color: #f87171; border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.15); }
        .badge-l { color: #fbbf24; border: 1px solid #f59e0b; background: rgba(245, 158, 11, 0.15); }
        .badge-h { color: #38bdf8; border: 1px solid #0284c7; background: rgba(2, 132, 199, 0.1); }
        .badge-none { color: #64748b; border: 1px dashed #475569; background: rgba(30, 41, 59, 0.5); }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase; text-align: center; display: inline-block; min-width: 75px; }
    </style>
</head>
<body class="pb-10">

    <div class="p-4 max-w-2xl mx-auto flex items-center justify-between sticky top-0 bg-[#0f172a] z-40">
        <button onclick="history.back()" class="text-sky-400 text-xl w-10 h-10 glass rounded-full flex items-center justify-center">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="text-lg font-black tracking-tighter italic text-center uppercase">SNT <span class="text-sky-500">Master Control</span></h1>
        <div class="w-10"></div> </div>

    <div class="px-4 max-w-2xl mx-auto mb-6">
        <div class="glass p-5 rounded-2xl border border-sky-500/20 flex flex-col gap-3">
            <label class="text-[10px] font-black uppercase text-sky-400 tracking-wider">
                <i class="fas fa-calendar-day mr-1"></i> Target Attendance Date:
            </label>
            <input type="date" id="master-date-picker" onchange="loadAttendanceByDate()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-sm outline-none focus:border-sky-500 text-white font-bold">
        </div>
    </div>

    <div class="px-4 max-w-2xl mx-auto mb-6">
        <div class="grid grid-cols-3 gap-3">
            <div class="glass p-3 rounded-xl text-center border-b-2 border-emerald-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Present</p>
                <h3 id="stat-present" class="text-xl font-black text-emerald-400">0</h3>
            </div>
            <div class="glass p-3 rounded-xl text-center border-b-2 border-red-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Absent</p>
                <h3 id="stat-absent" class="text-xl font-black text-red-400">0</h3>
            </div>
            <div class="glass p-3 rounded-xl text-center border-b-2 border-amber-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Leave</p>
                <h3 id="stat-leave" class="text-xl font-black text-amber-400">0</h3>
            </div>
        </div>
    </div>

    <div id="holiday-alert-box" class="px-4 max-w-2xl mx-auto mb-4 hidden">
        <div class="bg-sky-500/10 border border-sky-500/30 rounded-xl p-3 text-center">
            <p id="holiday-alert-text" class="text-xs font-black text-sky-400 uppercase italic tracking-tight"></p>
        </div>
    </div>

    <div class="px-4 max-w-2xl mx-auto">
        <div class="glass rounded-[2rem] overflow-hidden border border-slate-800 shadow-2xl">
            <div class="student-row bg-slate-800/60 text-[10px] font-black uppercase tracking-wider text-slate-400">
                <div>Student Profile & Node</div>
                <div class="text-right">Status Log</div>
            </div>
            <div id="master-roster-list" class="divide-y divide-white/5">
                <p class="text-center text-slate-500 font-bold text-xs py-10 uppercase">Selecting Timeline...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA",
            authDomain: "snt-computer-institute.firebaseapp.com",
            projectId: "snt-computer-institute",
            databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com",
            appId: "1:117580784781:web:73ba19d2d008beb3a5eec4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let globalStudents = {};
        let globalAttendance = {};
        let globalHolidays = {};

        // Set default date to today's date on initial load
        const today = new Date();
        const localTodayStr = today.toISOString().split('T')[0];
        document.getElementById('master-date-picker').value = localTodayStr;

        // Base Data Synchronization
        function initMasterSync() {
            onValue(ref(db, 'students'), (studSnap) => {
                globalStudents = studSnap.val() || {};
                
                onValue(ref(db, 'admin_holidays'), (holSnap) => {
                    globalHolidays = holSnap.val() || {};
                    
                    onValue(ref(db, 'attendance'), (attSnap) => {
                        globalAttendance = attSnap.val() || {};
                        loadAttendanceByDate(); 
                    });
                });
            });
        }

        window.loadAttendanceByDate = () => {
            const selectedDate = document.getElementById('master-date-picker').value;
            if(!selectedDate) return;

            const rosterContainer = document.getElementById('master-roster-list');
            const alertBox = document.getElementById('holiday-alert-box');
            const alertText = document.getElementById('holiday-alert-text');

            let countP = 0, countA = 0, countL = 0;
            let rosterHtml = '';

            // Check if Sunday or Admin declared Holiday
            const dateObj = new Date(selectedDate);
            const isSunday = dateObj.getDay() === 0;
            const holidayObj = globalHolidays[selectedDate];

            if (isSunday || holidayObj) {
                alertBox.classList.remove('hidden');
                alertText.innerText = holidayObj ? `⚠️ INSTITUTIONAL HOLIDAY: ${holidayObj.reason}` : "📅 SUNDAY: WEEKLY OFF DAY";
            } else {
                alertBox.classList.add('hidden');
            }

            const studentKeys = Object.keys(globalStudents);

            if(studentKeys.length === 0) {
                rosterContainer.innerHTML = `<p class="text-center text-slate-500 font-bold text-xs py-10 uppercase">No Student Logs Found</p>`;
                return;
            }

            studentKeys.forEach(key => {
                const s = globalStudents[key];
                
                // Find attendance record matching both the student key and selected date
                const record = Object.values(globalAttendance).find(
                    r => (r.studentKey === key || (r.email && s.email && r.email === s.email)) && r.date === selectedDate
                );

                let badgeHtml = '<span class="status-badge badge-none">No Entry</span>';
                
                if (isSunday) {
                    badgeHtml = '<span class="status-badge badge-h">Sunday</span>';
                } else if (holidayObj) {
                    badgeHtml = '<span class="status-badge badge-h">Holiday</span>';
                } else if (record) {
                    if (record.status === 'Present') { badgeHtml = '<span class="status-badge badge-p">Present</span>'; countP++; }
                    else if (record.status === 'Absent') { badgeHtml = '<span class="status-badge badge-a">Absent</span>'; countA++; }
                    else if (record.status === 'Leave') { badgeHtml = '<span class="status-badge badge-l">Leave</span>'; countL++; }
                } else {
                    // Check if student was admitted after this selected date
                    if(s.admissionDate && new Date(s.admissionDate) > dateObj) {
                        badgeHtml = '<span class="status-badge text-slate-600 border border-slate-800/40 text-[9px]">Pre-Admit</span>';
                    }
                }

                const sPic = s.profilePicture || s.photoURL || s.profilePic || "https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/SNT.png";

                rosterHtml += `
                    <div class="student-row hover:bg-slate-800/30 transition-colors">
                        <div class="flex items-center gap-3 min-w-0">
                            <img src="${sPic}" class="w-8 h-8 rounded-full object-cover bg-slate-800 border border-white/10" alt="Avatar">
                            <div class="truncate">
                                <h4 class="text-xs font-black text-slate-200 uppercase truncate">${s.name || 'Anonymous Node'}</h4>
                                <p class="text-[9px] font-bold text-sky-400 tracking-tight uppercase truncate">${s.course || 'O LEVEL'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            ${badgeHtml}
                        </div>
                    </div>`;
            });

            // Update Counters Dashboard
            document.getElementById('stat-present').innerText = countP;
            document.getElementById('stat-absent').innerText = countA;
            document.getElementById('stat-leave').innerText = countL;

            rosterContainer.innerHTML = rosterHtml;
        };

        // Initialize Firebase Listeners
        initMasterSync();
    </script>
</body>
</html>
