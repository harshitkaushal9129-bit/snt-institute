<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNT - Student Wise Attendance Viewer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .row-item { display: grid; grid-template-columns: 1fr 2fr 1.5fr; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Status Theme Styles */
        .btn-p, .status-p { color: #4ade80; border: 1.5px solid #22c55e; background: rgba(34, 197, 94, 0.15); box-shadow: 0 0 10px rgba(34, 197, 94, 0.1); }
        .btn-a, .status-a { color: #f87171; border: 1.5px solid #ef4444; background: rgba(239, 68, 68, 0.15); box-shadow: 0 0 10px rgba(239, 68, 68, 0.1); }
        .btn-l, .status-l { color: #fbbf24; border: 1.5px solid #f59e0b; background: rgba(245, 158, 11, 0.15); box-shadow: 0 0 10px rgba(245, 158, 11, 0.1); }
        .btn-h, .status-h { color: #38bdf8; border: 1.5px solid #0284c7; background: rgba(2, 132, 199, 0.1); }
        .btn-lock { color: #475569; border: 1px dashed #334155; background: rgba(15, 23, 42, 0.6); opacity: 0.4; cursor: not-allowed !important; }

        /* Calendar Grid Specifics */
        .cal-box { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 14px; font-weight: 700; font-size: 13px; position: relative; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.03); background: rgba(30, 41, 59, 0.3); cursor: pointer; }
        .cal-box:not(.btn-lock):hover { transform: translateY(-2px); border-color: rgba(56, 189, 248, 0.4); background: rgba(30, 41, 59, 0.6); }
        .cal-dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; bottom: 6px; }

        .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; text-align: center; display: inline-block; min-width: 70px; }
        .snt-logo-btn { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; display: flex; items-center; justify-center; border: 1px solid rgba(255,255,255,0.1); }
        .snt-logo-btn img { width: 100%; height: 100%; object-fit: cover; }
        #profile-card-modal { backdrop-filter: blur(20px); transition: all 0.3s ease; }
    </style>
</head>
<body class="pb-10">

    <div class="p-4 max-w-2xl mx-auto flex items-center justify-between sticky top-0 bg-[#0f172a] z-40">
        <button onclick="history.back()" class="text-sky-400 text-xl w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
        <h1 class="text-lg font-black tracking-tighter italic text-center uppercase">SNT <span class="text-emerald-400">Log Viewer</span></h1>
        <div class="snt-logo-btn glass">
            <img src="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/SNT.png" alt="SNT Logo">
        </div>
    </div>

    <div class="px-4 max-w-2xl mx-auto mb-4">
        <div class="glass p-5 rounded-[2rem] border-t-4 border-emerald-500 shadow-2xl">
            <label for="student-selector" class="text-emerald-400 font-black text-xs uppercase tracking-widest mb-2 block"><i class="fas fa-users mr-1"></i> Select Student To View Records</label>
            <select id="student-selector" onchange="handleStudentChange()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm outline-none text-white font-bold tracking-tight">
                <option value="">Loading students list...</option>
            </select>
        </div>
    </div>

    <div id="student-mini-profile" class="px-4 max-w-2xl mx-auto mb-4 hidden">
        <div class="glass p-4 rounded-2xl border border-slate-800 flex items-center gap-4">
            <div class="w-14 h-14 rounded-full p-0.5 bg-gradient-to-tr from-sky-500 to-emerald-500 shadow-lg">
                <img id="profile-avatar" src="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/SNT.png" class="w-full h-full object-cover rounded-full border border-slate-900 bg-slate-800" alt="Avatar">
            </div>
            <div>
                <h3 id="profile-name" class="font-black text-sm uppercase tracking-tight text-white">---</h3>
                <p id="profile-course" class="text-[10px] font-bold text-sky-400 tracking-wider uppercase">---</p>
                <p id="profile-admission" class="text-[9px] font-medium text-slate-400 italic">Admission: --/--/----</p>
            </div>
        </div>
    </div>

    <div class="px-4 max-w-2xl mx-auto mb-4 flex justify-between items-center glass p-3 rounded-2xl border border-slate-800">
        <button id="prev-month-btn" onclick="navigateMonth(-1)" class="px-4 py-2 bg-slate-800 text-sky-400 font-black text-[10px] uppercase rounded-xl active:scale-95 transition-all disabled:opacity-20 disabled:cursor-not-allowed">
            <i class="fas fa-chevron-left mr-1"></i> Prev
        </button>
        <div id="current-month-display" class="font-black italic text-sm text-white uppercase tracking-wider">Loading Month...</div>
        <button id="next-month-btn" onclick="navigateMonth(1)" class="px-4 py-2 bg-slate-800 text-sky-400 font-black text-[10px] uppercase rounded-xl active:scale-95 transition-all disabled:opacity-20 disabled:cursor-not-allowed">
            Next <i class="fas fa-chevron-right ml-1"></i>
        </button>
    </div>

    <div class="px-4 max-w-2xl mx-auto mb-6">
        <div class="glass p-4 rounded-[2rem] border border-slate-800 shadow-2xl">
            <div class="grid grid-cols-7 text-center text-[10px] font-black uppercase text-slate-400 tracking-wider mb-2 py-1 border-b border-white/5">
                <div class="text-red-400">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
        </div>
    </div>

    <div class="px-4 max-w-2xl mx-auto">
        <div class="glass rounded-[2rem] overflow-hidden border border-slate-800">
            <div class="row-item bg-slate-800/50 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                <div>Date</div>
                <div class="text-center">Reason / Day</div>
                <div class="text-right">Record</div>
            </div>
            <div id="register-list"></div>
        </div>
    </div>

    <div id="profile-card-modal" class="fixed inset-0 bg-slate-950/80 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="glass w-full max-w-sm rounded-[2.5rem] overflow-hidden border border-slate-700/50 shadow-2xl transform scale-95 transition-transform duration-300 relative p-6 text-center">
            <button onclick="closeProfileCard()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors w-8 h-8 rounded-full bg-slate-900/50 flex items-center justify-center border border-white/5">
                <i class="fas fa-times text-sm"></i>
            </button>
            <div class="mt-4 flex flex-col items-center">
                <div class="w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-sky-500 to-emerald-500 shadow-xl mb-4 relative">
                    <img id="card-student-pic" src="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/SNT.png" class="w-full h-full object-cover rounded-full border-2 border-slate-900 bg-slate-800" alt="Pic">
                    <div id="card-status-dot" class="w-5 h-5 rounded-full absolute bottom-0 right-0 border-4 border-slate-900 flex items-center justify-center"></div>
                </div>
                <h3 id="card-student-name" class="text-lg font-black tracking-tight text-white uppercase">---</h3>
                <p id="card-student-course" class="text-[10px] font-bold text-sky-400 tracking-widest uppercase mb-4">---</p>
                <div class="w-full bg-slate-900/60 rounded-2xl p-4 border border-white/5 flex flex-col gap-2 text-left text-xs">
                    <div class="flex justify-between border-b border-white/5 pb-1.5">
                        <span class="text-slate-400 font-medium">Target Date:</span>
                        <span id="card-attendance-date" class="font-bold text-slate-200">-- -- ----</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-1.5">
                        <span class="text-slate-400 font-medium">Status Log:</span>
                        <span id="card-attendance-status" class="font-black uppercase">--</span>
                    </div>
                    <div class="flex justify-between pt-0.5">
                        <span class="text-slate-400 font-medium">Description:</span>
                        <span id="card-attendance-desc" class="font-medium italic text-slate-400 truncate max-w-[150px]">Regular Day</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA",
            authDomain: "snt-computer-institute.firebaseapp.com",
            projectId: "snt-computer-institute",
            databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com/",
            storageBucket: "snt-computer-institute.firebasestorage.app",
            messagingSenderId: "117580784781",
            appId: "1:117580784781:web:73ba19d2d008beb3a5eec4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let adminHolidays = {};
        let attendanceData = {};
        let studentsList = [];
        let selectedStudent = null;

        const realToday = new Date();
        let currentSelectedDate = new Date(realToday.getFullYear(), realToday.getMonth(), 1);
        let admissionDate = null;

        window.onload = function() {
            loadGlobalMetaAndStudents();
        };

        function loadGlobalMetaAndStudents() {
            db.ref('admin_holidays').on('value', holSnapshot => {
                adminHolidays = holSnapshot.val() || {};
                
                db.ref('students').once('value', snap => {
                    const selector = document.getElementById('student-selector');
                    selector.innerHTML = '<option value="">-- Choose Student --</option>';
                    studentsList = [];

                    if (snap.exists()) {
                        snap.forEach(child => {
                            const val = child.val();
                            studentsList.push({
                                firebaseKey: child.key,
                                uid: val.uid || child.key,
                                name: val.name,
                                studentId: val.studentId || 'N/A',
                                course: val.course || 'NIELIT O LEVEL',
                                profilePic: val.profilePic || '',
                                admissionDate: val.admissionDate || ''
                            });
                            
                            selector.innerHTML += `<option value="${val.uid || child.key}">${val.name} (ID: ${val.studentId || 'N/A'})</option>`;
                        });
                    } else {
                        selector.innerHTML = '<option value="">No Students Found</option>';
                    }
                });
            });
        }

        window.handleStudentChange = () => {
            const selectedUid = document.getElementById('student-selector').value;
            const profileBox = document.getElementById('student-mini-profile');
            
            if(!selectedUid) {
                selectedStudent = null;
                profileBox.classList.add('hidden');
                clearUI();
                return;
            }

            selectedStudent = studentsList.find(s => s.uid === selectedUid);
            
            document.getElementById('profile-name').innerText = selectedStudent.name;
            document.getElementById('profile-course').innerText = selectedStudent.course;
            document.getElementById('profile-admission').innerText = `Admission: ${selectedStudent.admissionDate ? new Date(selectedStudent.admissionDate).toLocaleDateString() : 'N/A'}`;
            document.getElementById('profile-avatar').src = selectedStudent.profilePic || "https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/SNT.png";
            
            profileBox.classList.remove('hidden');
            
            admissionDate = selectedStudent.admissionDate ? new Date(selectedStudent.admissionDate) : new Date(realToday.getFullYear(), realToday.getMonth() - 3, 1);

            // Dono alag nodes se attendance records merge karne ke liye complex event logic tracker
            db.ref('attendance').on('value', attSnapshot => {
                const primaryData = attSnapshot.val() || {};
                
                // Aapka alternative secondary data node fetch check up (`student_attendance_logs`)
                db.ref('student_attendance_logs').on('value', secondSnapshot => {
                    const secondaryData = secondSnapshot.val() || {};
                    
                    // Dono databases ke objects ko safely ek master register state mein mix up karein
                    attendanceData = { ...secondaryData, ...primaryData };
                    renderUI();
                });
            });
        };

        window.navigateMonth = (direction) => {
            currentSelectedDate.setMonth(currentSelectedDate.getMonth() + direction);
            renderUI();
        };

        function clearUI() {
            document.getElementById('calendar-grid').innerHTML = '';
            document.getElementById('register-list').innerHTML = '';
            document.getElementById('current-month-display').innerText = 'Loading Month...';
        }

        function renderUI() {
            if(!selectedStudent) return;

            const list = document.getElementById('register-list');
            const calGrid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('current-month-display');
            const prevBtn = document.getElementById('prev-month-btn');
            const nextBtn = document.getElementById('next-month-btn');

            const viewYear = currentSelectedDate.getFullYear();
            const viewMonth = currentSelectedDate.getMonth();

            monthDisplay.innerText = currentSelectedDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            const admMonthLimit = new Date(admissionDate.getFullYear(), admissionDate.getMonth(), 1);
            const twelveMonthsLimit = new Date(realToday.getFullYear(), realToday.getMonth() - 11, 1);
            const dynamicPastLimit = admMonthLimit > twelveMonthsLimit ? admMonthLimit : twelveMonthsLimit;

            prevBtn.disabled = new Date(viewYear, viewMonth, 1) <= dynamicPastLimit;
            nextBtn.disabled = new Date(viewYear, viewMonth + 1, 1) > realToday;

            let calHtml = '';
            const firstDayIndex = new Date(viewYear, viewMonth, 1).getDay(); 
            const totalDaysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

            for (let e = 0; e < firstDayIndex; e++) {
                calHtml += `<div class="opacity-0 pointer-events-none"></div>`;
            }

            const admissionCompareTime = new Date(admissionDate.getFullYear(), admissionDate.getMonth(), admissionDate.getDate()).getTime();

            for (let d = 1; d <= totalDaysInMonth; d++) {
                const dayStrLoop = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const loopDateObj = new Date(dayStrLoop);
                const loopTime = loopDateObj.getTime();
                
                let boxClass = "cal-box";
                let dotHtml = "";
                let clickActionHtml = "";
                
                const isSun = loopDateObj.getDay() === 0;
                const isHoliday = adminHolidays[dayStrLoop];
                
                const recordKey = `${selectedStudent.uid}_${dayStrLoop}`;
                let hasRecord = attendanceData[recordKey];

                if (loopTime < admissionCompareTime) {
                    boxClass += " btn-lock text-slate-600";
                    clickActionHtml = `onclick="alert('Student ka Admission is date ke baad hua hai!')"`;
                } else {
                    if (hasRecord) {
                        if (hasRecord.status === 'Present') { boxClass += " status-p font-black text-emerald-400"; dotHtml = '<div class="cal-dot bg-green-400"></div>'; }
                        else if (hasRecord.status === 'Absent') { boxClass += " status-a font-black text-red-400"; dotHtml = '<div class="cal-dot bg-red-400"></div>'; }
                        else if (hasRecord.status === 'Leave') { boxClass += " status-l font-black text-amber-400"; dotHtml = '<div class="cal-dot bg-amber-400"></div>'; }
                        clickActionHtml = `onclick="openProfileCard('${dayStrLoop}', '${hasRecord.status}', 'Attendance Registered')"`;
                    } else if (isSun) {
                        boxClass += " status-h text-sky-400 border border-sky-500/20";
                        dotHtml = '<div class="cal-dot bg-sky-400"></div>';
                        clickActionHtml = `onclick="openProfileCard('${dayStrLoop}', 'Sunday', 'Weekly Institutional Off')"`;
                    } else if (isHoliday) {
                        boxClass += " status-h text-sky-400 border border-sky-500/20";
                        dotHtml = '<div class="cal-dot bg-sky-400"></div>';
                        clickActionHtml = `onclick="openProfileCard('${dayStrLoop}', 'Holiday', '${isHoliday.reason}')"`;
                    } else if (loopDateObj > realToday) {
                        boxClass += " opacity-25 text-slate-600 cursor-not-allowed";
                        clickActionHtml = `onclick="console.log('Future')"`;
                    } else {
                        boxClass += " text-slate-300 bg-slate-800/40 ring-1 ring-white/5"; 
                        clickActionHtml = `onclick="openProfileCard('${dayStrLoop}', 'None', 'No logs recorded for this day')"`;
                    }
                }

                if (viewYear === realToday.getFullYear() && viewMonth === realToday.getMonth() && d === realToday.getDate()) {
                    boxClass += " ring-2 ring-sky-400 ring-offset-2 ring-offset-slate-950";
                }

                calHtml += `<div class="${boxClass}" ${clickActionHtml}>${d}${dotHtml}</div>`;
            }
            calGrid.innerHTML = calHtml;

            let listHtml = '';
            let startDay = (viewYear === realToday.getFullYear() && viewMonth === realToday.getMonth()) ? realToday.getDate() : totalDaysInMonth;

            for (let d = startDay; d >= 1; d--) {
                const dayDateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dateObj = new Date(dayDateStr);
                
                if (dateObj.getTime() < admissionCompareTime) continue;

                const sun = dateObj.getDay() === 0;
                const hol = adminHolidays[dayDateStr];
                
                const recordKey = `${selectedStudent.uid}_${dayDateStr}`;
                const record = attendanceData[recordKey];

                let badge = '<span class="status-badge btn-lock">No Data</span>';
                let reasonText = dateObj.toLocaleDateString('en-US', { weekday: 'long' });

                if (sun) {
                    badge = '<span class="status-badge btn-h text-xs">Sunday</span>';
                    reasonText = "Weekly Off";
                } else if (hol) {
                    badge = '<span class="status-badge btn-h text-xs">Holiday</span>';
                    reasonText = hol.reason;
                } else if (record) {
                    if (record.status === 'Present') badge = '<span class="status-badge btn-p">Present</span>';
                    else if (record.status === 'Absent') badge = '<span class="status-badge btn-a">Absent</span>';
                    else if (record.status === 'Leave') badge = '<span class="status-badge btn-l">Leave</span>';
                }

                listHtml += `
                    <div class="row-item" onclick="openProfileCard('${dayDateStr}', '${record ? record.status : (sun ? 'Sunday' : (hol ? 'Holiday' : 'None'))}', '${hol ? hol.reason : (sun ? 'Weekly Off' : 'Regular Log Entry')}')">
                        <div class="font-bold text-xs text-slate-300">${d} ${dateObj.toLocaleString('default', { month: 'short' })}</div>
                        <div class="text-center text-[9px] font-bold text-slate-500 uppercase tracking-tighter italic overflow-hidden whitespace-nowrap px-1">${reasonText}</div>
                        <div class="text-right">${badge}</div>
                    </div>`;
            }
            list.innerHTML = listHtml || `<p class="text-slate-500 text-center text-[10px] font-bold py-8 uppercase tracking-widest">No entries available</p>`;
        }

        window.openProfileCard = (dateStr, statusType, description) => {
            const modal = document.getElementById('profile-card-modal');
            const cardInner = modal.querySelector('.glass');
            
            document.getElementById('card-student-name').innerText = selectedStudent.name;
            document.getElementById('card-student-course').innerText = selectedStudent.course;
            document.getElementById('card-attendance-date').innerText = new Date(dateStr).toDateString();
            document.getElementById('card-attendance-desc').innerText = description;
            document.getElementById('card-student-pic').src = selectedStudent.profilePic || "https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/SNT.png";

            const dot = document.getElementById('card-status-dot');
            const statusLabel = document.getElementById('card-attendance-status');

            if(statusType === 'Present') {
                statusLabel.innerText = "Present"; statusLabel.className = "font-black uppercase text-green-400";
                dot.className = "w-5 h-5 rounded-full absolute bottom-0 right-0 border-4 border-slate-900 bg-green-500";
            } else if(statusType === 'Absent') {
                statusLabel.innerText = "Absent"; statusLabel.className = "font-black uppercase text-red-400";
                dot.className = "w-5 h-5 rounded-full absolute bottom-0 right-0 border-4 border-slate-900 bg-red-500";
            } else if(statusType === 'Leave') {
                statusLabel.innerText = "Leave Granted"; statusLabel.className = "font-black uppercase text-amber-400";
                dot.className = "w-5 h-5 rounded-full absolute bottom-0 right-0 border-4 border-slate-900 bg-amber-500";
            } else if(statusType === 'Sunday' || statusType === 'Holiday') {
                statusLabel.innerText = statusType; statusLabel.className = "font-black uppercase text-sky-400";
                dot.className = "w-5 h-5 rounded-full absolute bottom-0 right-0 border-4 border-slate-900 bg-sky-500";
            } else {
                statusLabel.innerText = "No Record"; statusLabel.className = "font-black uppercase text-slate-500";
                dot.className = "w-5 h-5 rounded-full absolute bottom-0 right-0 border-4 border-slate-900 bg-slate-600";
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                cardInner.classList.remove('scale-95');
            }, 10);
        };

        window.closeProfileCard = () => {
            const modal = document.getElementById('profile-card-modal');
            const cardInner = modal.querySelector('.glass');
            
            modal.classList.add('opacity-0');
            cardInner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        };
    </script>
</body>
</html>
