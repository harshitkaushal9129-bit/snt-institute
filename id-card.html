<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNT Glassmorphism ID Card - Pro Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    
    :root {
      --snt-primary: #002d5b;
      --snt-accent: #ff6d00;
      --glass-border: rgba(255, 255, 255, 0.5);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #cfd9df;
      background-image: radial-gradient(circle at 20% 30%, #ffffff 0%, #cfd9df 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
    }

    /* Input Panel */
    .no-print {
      background: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 450px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid #fff;
    }
    .no-print input[type="text"] { width: 85%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; margin-bottom: 15px; outline: none; }
    .sig-input-wrap { font-size: 12px; margin-bottom: 15px; color: #555; }
    .btn-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: white; transition: 0.3s; }
    .btn-gen { background: var(--snt-primary); }
    .btn-switch { background: #555; }
    .btn-print { background: #28a745; }

    /* --- ID CARD BASE --- */
    #id-card { 
      width: 350px; height: 550px; 
      background: rgba(255, 255, 255, 0.45); 
      border-radius: 35px; 
      position: relative; 
      overflow: hidden; 
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(0,0,0,0.12);
      display: none; 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #id-card.landscape { width: 550px; height: 350px; }

    /* Header */
    .header-section {
      height: 140px;
      background: linear-gradient(135deg, #001f3f, #004e92);
      clip-path: polygon(0 0, 100% 0, 100% 75%, 0 100%);
      display: flex; justify-content: center; padding-top: 15px; position: relative;
    }
    .landscape .header-section { height: 75px; clip-path: none; }
    .logo-container { background: white; padding: 5px 15px; border-radius: 10px; z-index: 2; height: fit-content; }
    .logo-container img { width: 130px; }

    /* Profile Photo */
    .photo-wrap { margin-top: -65px; display: flex; justify-content: center; position: relative; z-index: 5; }
    .landscape .photo-wrap { position: absolute; left: 25px; top: 100px; margin: 0; }
    .student-photo { width: 115px; height: 135px; border: 5px solid #fff; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: #f0f0f0; }

    .name-area { text-align: center; margin-top: 15px; }
    .landscape .name-area { margin-left: 160px; text-align: left; margin-top: 25px; }
    .name-area h2 { margin: 0; font-size: 20px; font-weight: 800; color: #001f3f; text-transform: uppercase; }
    .course-pill { background: var(--snt-accent); color: white; padding: 3px 18px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; margin-top: 5px; }

    /* Details */
    .details-list { padding: 20px 30px; }
    .landscape .details-list { margin-left: 145px; padding: 10px 20px; width: 350px; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .label { font-size: 9px; font-weight: 700; color: #666; text-transform: uppercase; }
    .value { font-size: 11px; font-weight: 700; color: #111; }

    /* Footer & Signature */
    .footer-area { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 35px; margin-top: 5px; }
    .landscape .footer-area { position: absolute; bottom: 65px; right: 25px; width: 340px; padding: 0; }
    
    #qrcode { background: white; padding: 5px; border-radius: 10px; border: 1px solid #eee; }
    .sign-box { text-align: center; width: 110px; position: relative; }
    #d-sign { width: 80px; height: 40px; object-fit: contain; margin-bottom: -10px; display: none; }
    .sign-line { border-top: 1.5px solid #001f3f; margin-top: 10px; font-size: 9px; font-weight: 800; color: #333; }

    .bottom-strip {
      position: absolute; bottom: 0; width: 100%; height: 50px;
      background: #001529; color: white; display: flex; justify-content: center; align-items: center;
    }
    .bottom-strip b { font-size: 11px; letter-spacing: 1px; }

    @media print { .no-print { display: none; } #id-card { display: block !important; box-shadow: none; } }
  </style>
</head>
<body>

  <div class="no-print">
    <h2>SNT ID Generator Pro</h2>
    <input type="text" id="id-input" placeholder="Enter Roll Number">
    
    <div class="sig-input-wrap">
      Upload Signature (PNG/JPG): <br>
      <input type="file" id="sig-upload" accept="image/*" onchange="loadSignature(event)">
    </div>

    <div class="btn-group">
        <button class="btn btn-gen" onclick="generateCard()">Generate</button>
        <button class="btn btn-switch" onclick="toggleOrientation()">Switch View 🔄</button>
        <button class="btn btn-print" onclick="window.print()">Save PDF</button>
    </div>
  </div>

  <div id="id-card">
    <div class="header-section">
      <div class="logo-container"><img src="Logo (1).jpg"></div>
    </div>

    <div class="photo-wrap">
      <img id="d-photo" src="" class="student-photo">
    </div>

    <div class="name-area">
      <h2 id="d-name">STUDENT NAME</h2>
      <div id="d-course" class="course-pill">COURSE</div>
    </div>

    <div class="details-list">
      <div class="detail-row"><span class="label">Roll No</span><span id="d-id" class="value">-</span></div>
      <div class="detail-row"><span class="label">Father</span><span id="d-father" class="value">-</span></div>
      <div class="detail-row"><span class="label">D.O.B</span><span id="d-dob" class="value">-</span></div>
      <div class="detail-row"><span class="label">Contact</span><span id="d-mobile" class="value">-</span></div>
    </div>

    <div class="footer-area">
      <div id="qrcode"></div>
      <div class="sign-box">
        <img id="d-sign" src="" alt="Signature">
        <div class="sign-line">Director Sign</div>
      </div>
    </div>

    <div class="bottom-strip"><b>SNT COMPUTER INSTITUTE</b></div>
  </div>

  <script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA", 
        authDomain: "snt-computer-institute.firebaseapp.com", 
        databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com/", 
        projectId: "snt-computer-institute", 
        storageBucket: "snt-computer-institute.firebasestorage.app", 
        messagingSenderId: "117580784781", 
        appId: "1:117580784781:web:73ba19d2d008beb3a5eec4" 
    };
    firebase.initializeApp(firebaseConfig);

    // Load signature from file input
    function loadSignature(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('d-sign');
            output.src = reader.result;
            output.style.display = 'inline-block';
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    function toggleOrientation() {
        document.getElementById('id-card').classList.toggle('landscape');
    }

    function generateCard() {
      const sid = document.getElementById('id-input').value.trim();
      if(!sid) return alert("Roll number daalein!");

      firebase.database().ref('students').orderByChild('studentId').equalTo(sid).once('value', snap => {
        if(snap.exists()){
          const u = Object.values(snap.val())[0];
          document.getElementById('d-name').innerText = u.name;
          document.getElementById('d-id').innerText = u.studentId;
          document.getElementById('d-course').innerText = u.course || u.courses;
          document.getElementById('d-father').innerText = u.fatherName;
          document.getElementById('d-dob').innerText = u.dob;
          document.getElementById('d-mobile').innerText = u.mobile;
          document.getElementById('d-photo').src = u.profilePicture;

          document.getElementById('qrcode').innerHTML = "";
          new QRCode(document.getElementById('qrcode'), { 
            text: `https://harshitkaushal9129-bit.github.io/snt-institute/id-verify.html?id=${u.studentId}`, 
            width: 70, height: 70, colorDark: "#001529"
          });

          document.getElementById('id-card').style.display = 'block';
        } else { alert("Data nahi mila!"); }
      });
    }
  </script>
</body>
</html>
